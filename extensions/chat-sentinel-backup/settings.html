<div id="chat_sentinel_backup_settings" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>聊天记录守护备份</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="chat_sentinel_controls">
            <div class="chat_sentinel_options">
                <label class="checkbox_label chat_sentinel_toggle" title="开启后，消息变化会自动写入专用文件级快照。">
                    <input id="chat_sentinel_enabled" type="checkbox">
                    <span>启用守护备份</span>
                </label>
                <label class="chat_sentinel_field" title="同一个聊天的自动备份最短间隔，避免频繁写盘。">
                    <span>间隔秒数</span>
                    <input id="chat_sentinel_interval" type="number" min="5" max="300" step="1">
                </label>
                <label class="chat_sentinel_field" title="每个聊天保留多少份独立快照。">
                    <span>每聊保留</span>
                    <input id="chat_sentinel_keep" type="number" min="5" max="500" step="1">
                </label>
            </div>
            <div class="chat_sentinel_actions">
                <button id="chat_sentinel_backup_now" class="menu_button">立即备份</button>
                <button id="chat_sentinel_backup_all" class="menu_button" title="把当前角色卡或群聊名下的所有聊天文件都写入守护快照。">备份本卡全部聊天</button>
                <button id="chat_sentinel_choose" class="menu_button">选择聊天备份</button>
                <button id="chat_sentinel_versions_open" class="menu_button">管理当前版本</button>
                <button id="chat_sentinel_refresh" class="menu_button">刷新状态</button>
            </div>
        </div>
        <div id="chat_sentinel_versions" class="chat_sentinel_picker" hidden>
            <div class="chat_sentinel_picker_bar">
                <b>当前聊天的快照版本</b>
                <div class="chat_sentinel_picker_actions">
                    <button id="chat_sentinel_versions_all" class="menu_button">全选</button>
                    <button id="chat_sentinel_versions_none" class="menu_button">清空</button>
                    <button id="chat_sentinel_versions_keep" class="menu_button">保留已选版本</button>
                    <button id="chat_sentinel_versions_unkeep" class="menu_button">取消保留</button>
                </div>
            </div>
            <div id="chat_sentinel_versions_list" class="chat_sentinel_picker_list">尚未加载。</div>
        </div>
        <div id="chat_sentinel_picker" class="chat_sentinel_picker" hidden>
            <div class="chat_sentinel_picker_bar">
                <b>选择要备份的聊天</b>
                <div class="chat_sentinel_picker_actions">
                    <button id="chat_sentinel_select_all" class="menu_button">全选</button>
                    <button id="chat_sentinel_select_none" class="menu_button">清空</button>
                    <button id="chat_sentinel_backup_selected" class="menu_button">备份已选</button>
                </div>
            </div>
            <div id="chat_sentinel_picker_list" class="chat_sentinel_picker_list">尚未加载。</div>
        </div>
        <div id="chat_sentinel_status" class="chat_sentinel_status">等待初始化...</div>
        <div id="chat_sentinel_list" class="chat_sentinel_list"></div>
    </div>
</div>
